        format: json
        fields: *locale_fields

  - name: estructura
    label: Estructura base
    type: group
    items:
      - name: ods_catalog
        label: Catálogo ODS
        type: file
        path: src/data/content/odsCatalog.json
        format: json
        list: true
        fields:
          - name: id
            label: Número ODS
            type: string
          - name: name
            label: Nombre del ODS
            type: string

  - name: videos
    label: Vídeos
    type: file
    path: src/data/content/videoSections.json
    format: json
    list: true
    fields:
      - name: id
        label: Número ODS
        type: string
      - name: title
        label: Título del bloque
        type: string
      - name: groupLink
        label: Enlace de grupo o lista
        type: string
      - name: planned
        label: Bloque previsto
        type: boolean
      - name: note
        label: Nota del bloque
        type: text
      - name: videos
        label: Vídeos del bloque
        type: object
        list: true
        fields:
          - name: slot
            label: Posición o número
            type: string
          - name: title
            label: Título del vídeo
            type: string
          - name: url
            label: URL del vídeo
            type: string
          - name: authors
            label: Autores
            type: text
          - name: license
            label: Licencia
            type: string
          - name: licenseUrl
            label: URL de licencia
            type: string
          - name: subtitles
            label: Subtítulos
            type: string
          - name: character
            label: Carácter
            type: string

  - name: quiz
    label: Autoevaluación
    type: file
    path: src/data/content/quiz.json
    format: json
    fields:
      - name: bankNote
        label: Nota introductoria
        type: text
      - name: categories
        label: Categorías de resultado
        type: object
        list: true
        fields:
          - name: label
            label: Nombre de la categoría
            type: string
          - name: min
            label: Mínimo
            type: number
          - name: max
            label: Máximo
            type: number
          - name: text
            label: Descripción
            type: text
      - name: questions
        label: Preguntas
        type: object
        list: true
        fields:
          - name: id
            label: ID
            type: string
          - name: orientation
            label: Orientación
            type: select
            options:
              values: [Informativa, Motivadora]
          - name: sourceVideo
            label: Vídeo de referencia
            type: string
          - name: prompt
            label: Pregunta
            type: text
          - name: options
            label: Opciones
            type: string
            list: true
          - name: correctIndex
            label: Índice correcto
            type: number
          - name: explanation
            label: Explicación
            type: text

  - name: profundizacion
    label: Profundización
    type: file
    path: src/data/content/deepeningSections.json
    format: json
    list: true
    fields:
      - name: id
        label: Número ODS
        type: string
      - name: title
        label: Título del bloque
        type: string
      - name: items
        label: Recursos directos
        type: object
        list: true
        fields: &resource_fields
          - name: title
            label: Título
            type: string
          - name: summary
            label: Resumen
            type: text
          - name: difficulty
            label: Dificultad
            type: string
          - name: time
            label: Tiempo estimado
            type: string
          - name: url
            label: URL
            type: string
      - name: subtopics
        label: Subtemas
        type: object
        list: true
        fields:
          - name: title
            label: Título del subtema
            type: string
          - name: items
            label: Recursos del subtema
            type: object
            list: true
            fields: *resource_fields

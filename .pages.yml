settings:
  content:
    merge: true
  commit:
    identity: user
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"

media:
  input: public/uploads
  output: /uploads
  categories: [image, document]
  rename: safe

content:
  - name: textos
    label: Textos
    type: group
    items:
      - name: locale_es
        label: Castellano
        type: file
        path: src/data/content/locales/es.json
        format: json
        fields: &locale_fields
          - name: htmlLang
            label: Idioma HTML
            type: string
          - name: localeLabel
            label: Código corto
            type: string
          - name: siteTitle
            label: Título del sitio
            type: string
          - name: seoDescription
            label: Descripción SEO
            type: text
          - name: heroEyebrow
            label: Texto superior del hero
            type: string
          - name: heroTitle
            label: Titular principal
            type: string
          - name: heroLead
            label: Texto principal
            type: text
          - name: heroNote
            label: Nota del hero
            type: text
          - name: nav
            label: Navegación
            type: object
            fields:
              - name: home
                label: Inicio
                type: string
              - name: overview
                label: ODS
                type: string
              - name: videos
                label: Vídeos
                type: string
              - name: quiz
                label: Autoevaluación
                type: string
              - name: deepening
                label: Profundización
                type: string
          - name: home
            label: Inicio
            type: object
            fields:
              - name: title
                label: Título de la sección
                type: string
              - name: lead
                label: Texto introductorio
